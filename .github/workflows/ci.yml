name: Frontend CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build:
    name: Lint & build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      # Lint informatif (n'échoue pas le pipeline tant que la dette lint
      # pré-existante n'est pas résorbée). Le build reste la barrière bloquante.
      - name: Lint (non-blocking)
        run: npm run lint
        continue-on-error: true

      - name: Build (vite)
        run: npm run build
